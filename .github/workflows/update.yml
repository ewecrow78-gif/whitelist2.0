name: 🔄 Update VPN Configs

on:
  schedule:
    # Каждые 6 часов
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force_collect:
        description: "Принудительный сбор"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 📁 Create directories
        run: |
          mkdir -p configs/countries configs/protocols configs/tgk cache logs

      - name: 🕷️ Collect configs
        run: python -m scripts.collect
        timeout-minutes: 20

      - name: 🔍 Check configs
        run: python -m scripts.check
        timeout-minutes: 30

      - name: 📝 Update README
        run: python -m scripts.update_readme

      - name: 💾 Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Gh0st Bot"
          git add configs/ README.md
          git diff --cached --quiet || git commit -m "🤖 Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
